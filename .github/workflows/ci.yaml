name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.8.*'

jobs:
  build-and-test-macos:
    name: Build and Test on macOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: brew install cppcheck

      - name: Lint
        run: bash scripts/lint.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build
        run: |
          qmake CONFIG+=debug ChronoPlotter.pro
          make -j$(sysctl -n hw.logicalcpu)

      - name: Install lcov
        run: brew install lcov

      - name: Build tests with coverage
        run: |
          mkdir -p tests/build
          cd tests/build
          qmake CONFIG+=debug CONFIG+=coverage ../tests.pro
          make -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: |
          cd tests/build
          QT_QPA_PLATFORM=offscreen ./tests.app/Contents/MacOS/tests -v2

      - name: Generate coverage report
        run: |
          lcov --capture --directory tests/build --output-file coverage.info \
            --ignore-errors inconsistent,unsupported,format
          lcov --remove coverage.info \
            '*/Qt*' '/usr/*' '*/QXlsx/*' '*/qcustomplot/*' '*/miniz*' \
            --output-file coverage.info \
            --ignore-errors inconsistent,unsupported,format

      - name: Upload to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Package DMG
        run: |
          REF_NAME="${{ github.ref_name }}"
          SAFE_NAME="${REF_NAME//\//-}"
          macdeployqt ChronoPlotter.app -dmg
          mv ChronoPlotter.dmg "ChronoPlotter-${SAFE_NAME}-macos.dmg"
          echo "DMG_NAME=ChronoPlotter-${SAFE_NAME}-macos.dmg" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}

  build-and-test-windows:
    name: Build and Test on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          qmake CONFIG+=debug ChronoPlotter.pro
          nmake

      - name: Build tests
        run: |
          New-Item -ItemType Directory -Force -Path tests\build | Out-Null
          Set-Location tests\build
          qmake CONFIG+=debug ..\tests.pro
          nmake

      - name: Run tests
        run: |
          Set-Location tests\build
          $env:QT_QPA_PLATFORM = "offscreen"
          .\debug\tests.exe -v2

      - name: Stage and deploy Qt DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory staging
          Copy-Item debug\ChronoPlotter.exe staging\
          windeployqt staging\ChronoPlotter.exe

      - name: Package ZIP
        shell: pwsh
        run: |
          $safeName = "${{ github.ref_name }}" -replace '/', '-'
          Compress-Archive -Path staging\* -DestinationPath "ChronoPlotter-${safeName}-windows.zip"
          echo "ZIP_NAME=ChronoPlotter-${safeName}-windows.zip" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ env.ZIP_NAME }}

