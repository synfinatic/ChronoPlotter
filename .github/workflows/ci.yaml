name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: brew install cppcheck

      - name: Lint
        run: bash scripts/lint.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build
        run: |
          qmake CONFIG+=debug ChronoPlotter.pro
          make -j$(sysctl -n hw.logicalcpu)
