name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: brew install cppcheck

      - name: Lint
        run: bash scripts/lint.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build
        run: |
          qmake CONFIG+=debug ChronoPlotter.pro
          make -j$(sysctl -n hw.logicalcpu)

      - name: Install lcov
        run: brew install lcov

      - name: Build tests with coverage
        run: |
          mkdir -p tests/build
          cd tests/build
          qmake CONFIG+=debug CONFIG+=coverage ../tests/tests.pro
          make -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: |
          cd tests/build
          QT_QPA_PLATFORM=offscreen ./tests -v2

      - name: Generate coverage report
        run: |
          lcov --capture --directory tests/build --output-file coverage.info
          lcov --remove coverage.info \
            '*/Qt*' '/usr/*' '*/QXlsx/*' '*/qcustomplot/*' '*/miniz*' \
            --output-file coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
